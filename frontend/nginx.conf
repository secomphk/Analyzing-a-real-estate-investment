# Nginx config for the static SPA bundle.
#
# - Strong gzip on assets (text/* + JSON + JS + CSS + SVG).
# - Hashed Vite assets get a 1-year immutable cache; index.html stays fresh.
# - SPA routing: every non-asset path falls back to /index.html.
# - /api/* is proxied to the backend; the upstream is configurable via
#   the BACKEND_UPSTREAM env var (resolved with envsubst at startup).
#
# Designed to run as the non-root `nginx` user on port 8080.

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Drop server header — small but easy hardening win.
    server_tokens off;

    # ─── Compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─── Cache policies ────────────────────────────────────────────────────
    # Vite emits content-hashed filenames into /assets/, so we can cache hard.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html and other root files must revalidate so users see new bundles
    # immediately after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ─── Healthcheck ───────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ─── API proxy (optional — disabled when BACKEND_UPSTREAM is empty) ─────
    # In platforms where the frontend and backend are deployed to different
    # hostnames (Vercel + Railway), drop this block and have the SPA call the
    # backend directly via VITE_API_URL.
    location /api/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Security headers (basic baseline) ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ─── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
