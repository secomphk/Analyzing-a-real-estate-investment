[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# URL is overridden in alembic/env.py to read from settings.DATABASE_URL_SYNC,
# but we keep a placeholder here so `alembic --help` doesn't trip.
sqlalchemy.url = postgresql://realestate:realestate@localhost:5432/realestate

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
