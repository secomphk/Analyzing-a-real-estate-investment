name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  lint-test-build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund

      - run: npm run typecheck

      - run: npm test --silent

      - run: npm run build
        env:
          # Build-time env. Fall back to empty so the bundle compiles even
          # without a Kakao key — pages render with the graceful fallback.
          VITE_API_URL: ${{ vars.VITE_API_URL_STAGING || '' }}
          VITE_KAKAO_MAP_KEY: ${{ vars.VITE_KAKAO_MAP_KEY_STAGING || '' }}
